<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busco tu Renta by Jocelyn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --azul-marino: #0a192f;
            --fucsia: #e0115f;
            --turquesa: #40e0d0;
            --blanco: #ffffff;
            --fondo-gris: #f8f9fa;
            --texto: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--fondo-gris); background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; color: var(--texto); display: flex; flex-direction: column; min-height: 100vh; }

        /* HEADER */
        .header { background-color: var(--blanco); box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-container { font-size: 24px; font-weight: 700; color: var(--turquesa); text-decoration: none; display: flex; align-items: center;}
        .logo-container span { color: var(--azul-marino); }
        .logo-container img { max-height: 50px; width: auto; }
        .nav-links a { color: var(--azul-marino); text-decoration: none; margin-left: 30px; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--fucsia); }

        /* HERO & PERFIL */
        .hero-section { background: linear-gradient(135deg, var(--azul-marino) 0%, #112b52 100%); padding: 60px 20px; display: flex; justify-content: center; }
        .perfil-card { background: var(--blanco); border-radius: 20px; padding: 40px; display: flex; align-items: center; gap: 40px; max-width: 900px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border-left: 8px solid var(--fucsia); }
        .foto-perfil { width: 220px; border-radius: 15px; border: 4px solid var(--turquesa); }
        .info-perfil h3 { color: var(--azul-marino); font-size: 32px; margin-bottom: 5px; }
        .info-perfil h4 { color: var(--fucsia); font-size: 16px; font-weight: 400; margin-bottom: 15px; }
        .info-perfil p { color: #555; font-size: 15px; margin-bottom: 15px; }
        .contacto-info { display: flex; gap: 15px; font-size: 14px; font-weight: 600; color: var(--azul-marino); }
        .contacto-info i { color: var(--turquesa); }

        /* PROPIEDADES */
        .propiedades-section { padding: 80px 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .seccion-titulo { text-align: center; color: var(--azul-marino); font-size: 36px; margin-bottom: 50px; font-weight: 700; }
        .seccion-titulo::after { content: ''; width: 60px; height: 4px; background-color: var(--turquesa); display: block; margin: 10px auto 0; }
        .grid-propiedades { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
        
        .tarjeta-propiedad { background: var(--blanco); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: 0.3s; position: relative; }
        .tarjeta-propiedad:hover { transform: translateY(-10px); }
        .imagen-portada { position: relative; height: 260px; }
        .imagen-portada img { width: 100%; height: 100%; object-fit: cover; }
        
        .badge-operacion { position: absolute; top: 20px; left: 20px; background-color: var(--turquesa); color: var(--azul-marino); padding: 5px 15px; border-radius: 20px; font-weight: 700; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .badge-venta { background-color: var(--azul-marino); color: var(--blanco); }
        .precio-tag { position: absolute; bottom: 20px; right: 20px; background-color: var(--fucsia); color: var(--blanco); padding: 10px 20px; border-radius: 30px; font-weight: 700; font-size: 20px; }
        
        .info-propiedad { padding: 30px; }
        .info-propiedad h3 { color: var(--azul-marino); font-size: 22px; margin-bottom: 10px; }
        .estado-prop { font-size: 13px; font-weight: 600; margin-bottom: 15px; display: inline-block; padding: 3px 10px; border-radius: 10px; background: #eee; }
        .detalles-basicos { display: flex; gap: 15px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .detalles-basicos span { color: var(--turquesa); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .detalles-basicos i { color: var(--azul-marino); }
        
        .carrusel { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; margin-top: 15px; scrollbar-width: thin; }
        .carrusel img { width: 90px; height: 60px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        .btn-pago { display: flex; justify-content: center; align-items: center; gap: 10px; background-color: var(--fucsia); color: var(--blanco); padding: 15px; margin-top: 25px; border-radius: 10px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .btn-pago:hover { background-color: var(--azul-marino); }

        /* FOOTER */
        .footer { background-color: var(--azul-marino); color: var(--blanco); padding: 40px 20px 20px; margin-top: auto; border-top: 5px solid var(--fucsia); text-align: center; }
        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .social-icons a { color: var(--blanco); font-size: 24px; transition: 0.3s; display: none; } /* Ocultos por defecto hasta que se llenen en Sanity */
        .social-icons a.active { display: block; }
        .social-icons a:hover { color: var(--turquesa); transform: scale(1.1); }
        .creador { color: var(--turquesa); font-weight: 600; font-size: 13px; margin-top: 15px; }

        @media (max-width: 768px) { .perfil-card { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="nav-container">
            <a href="#" id="logo-header" class="logo-container">Busco tu Renta <span>by Jocelyn</span></a>
            <nav class="nav-links"><a href="#perfil">Sobre Mí</a><a href="#propiedades">Propiedades</a></nav>
        </div>
    </header>

    <section id="perfil" class="hero-section">
        <div id="perfil-contenedor" class="perfil-card">
            <p>Conectando con el servidor...</p>
        </div>
    </section>

    <section id="propiedades" class="propiedades-section">
        <h2 class="seccion-titulo">Nuestro Inventario</h2>
        <div id="propiedades-contenedor" class="grid-propiedades">
            <p>Cargando inventario...</p>
        </div>
    </section>

    <footer class="footer">
        <div class="social-icons">
            <a id="link-facebook" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            <a id="link-instagram" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a id="link-youtube" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        </div>
        <p id="footer-text">&copy; 2026 Busco tu Renta by Jocelyn.</p>
        <p class="creador">Desarrollado y automatizado por IntegratCore <i class="fa-solid fa-bolt" style="color:var(--fucsia);"></i></p>
    </footer>

    <script type="module">
        import { createClient } from 'https://esm.sh/@sanity/client';
        import imageUrlBuilder from 'https://esm.sh/@sanity/image-url';

        const client = createClient({
            projectId: 'h9qxyeqi', 
            dataset: 'production',
            useCdn: false,
            apiVersion: '2023-05-03'
        });

        const builder = (typeof imageUrlBuilder === 'function') ? imageUrlBuilder(client) : imageUrlBuilder.default(client);
        function urlFor(source) { return source ? builder.image(source) : null; }

        async function cargarDatos() {
            try {
                // 1. CARGAR AJUSTES GENERALES
                const ajustes = await client.fetch('*[_type == "ajustes"][0]');
                if (ajustes) {
                    if (ajustes.logo) {
                        document.getElementById('logo-header').innerHTML = `<img src="${urlFor(ajustes.logo).height(60).url()}" alt="Logo">`;
                    }
                    if (ajustes.redesSociales) {
                        if (ajustes.redesSociales.facebook) { document.getElementById('link-facebook').href = ajustes.redesSociales.facebook; document.getElementById('link-facebook').classList.add('active'); }
                        if (ajustes.redesSociales.instagram) { document.getElementById('link-instagram').href = ajustes.redesSociales.instagram; document.getElementById('link-instagram').classList.add('active'); }
                        if (ajustes.redesSociales.youtube) { document.getElementById('link-youtube').href = ajustes.redesSociales.youtube; document.getElementById('link-youtube').classList.add('active'); }
                    }
                    if (ajustes.textoFooter) document.getElementById('footer-text').innerText = ajustes.textoFooter;
                }

                // 2. CARGAR PERFIL
                const perfil = await client.fetch('*[_type == "perfil"][0]');
                const pCont = document.getElementById('perfil-contenedor');
                if (perfil) {
                    const fotoUrl = perfil.fotoPerfil ? urlFor(perfil.fotoPerfil).url() : '';
                    const telefono = perfil.contacto?.telefono ? `<span><i class="fa-brands fa-whatsapp"></i> ${perfil.contacto.telefono}</span>` : '';
                    const correo = perfil.contacto?.correo ? `<span><i class="fa-solid fa-envelope"></i> ${perfil.contacto.correo}</span>` : '';
                    
                    pCont.innerHTML = `
                        ${fotoUrl ? `<img src="${fotoUrl}" class="foto-perfil" alt="Foto">` : ''}
                        <div class="info-perfil">
                            <h3>${perfil.nombre || 'Agente'}</h3>
                            <h4>${perfil.tituloPro || 'Especialista en Bienes Raíces'}</h4>
                            <p>${perfil.descripcion || ''}</p>
                            <div class="contacto-info">${telefono} ${correo}</div>
                        </div>
                    `;
                }

                // 3. CARGAR PROPIEDADES
                const props = await client.fetch('*[_type == "propiedad"]');
                const propCont = document.getElementById('propiedades-contenedor');
                propCont.innerHTML = '';

                if (props.length === 0) {
                    propCont.innerHTML = `<p style="text-align:center; grid-column:1/-1;">No hay propiedades publicadas aún.</p>`;
                    return;
                }

                props.forEach(prop => {
                    const imgPrinc = prop.imagenPrincipal ? urlFor(prop.imagenPrincipal).width(800).url() : '';
                    const fotos = (prop.galeria && Array.isArray(prop.galeria)) ? prop.galeria.map(f => `<img src="${urlFor(f).width(200).url()}">`).join('') : '';
                    const operacionClase = prop.operacion === 'Venta' ? 'badge-venta' : '';
                    const m2 = prop.caracteristicas?.metros ? `<span><i class="fa-solid fa-ruler-combined"></i> ${prop.caracteristicas.metros} m²</span>` : '';

                    propCont.innerHTML += `
                        <div class="tarjeta-propiedad">
                            <div class="imagen-portada">
                                <div class="badge-operacion ${operacionClase}">${prop.operacion || 'Alquiler'}</div>
                                ${imgPrinc ? `<img src="${imgPrinc}">` : '<div style="background:#ddd;height:100%;display:flex;align-items:center;justify-content:center;">Sin Imagen</div>'}
                                <div class="precio-tag">$${prop.precio ? prop.precio.toLocaleString() : '0'}</div>
                            </div>
                            <div class="info-propiedad">
                                <h3>${prop.titulo || 'Sin título'}</h3>
                                <div class="estado-prop">Estado: ${prop.estado || 'Disponible'}</div>
                                
                                <div class="detalles-basicos">
                                    <span><i class="fa-solid fa-bed"></i> ${prop.caracteristicas?.habitaciones || 0}</span>
                                    <span><i class="fa-solid fa-bath"></i> ${prop.caracteristicas?.banos || 0}</span>
                                    ${m2}
                                </div>
                                
                                ${fotos ? `<div class="carrusel">${fotos}</div>` : ''}
                                ${prop.linkDePago ? `<a href="${prop.linkDePago}" target="_blank" class="btn-pago">Contactar / Reservar</a>` : ''}
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('propiedades-contenedor').innerHTML = `<p style="color:red; grid-column:1/-1;">Error de conexión: ${err.message}</p>`;
            }
        }
        cargarDatos();
    </script>
</body>
</html>

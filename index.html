<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busco tu Renta by Jocelyn</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --azul-marino: #06142e;
            --azul-profundo: #0b192f;
            --fucsia: #ff1493;
            --fucsia-neon: #ff007f;
            --turquesa: #00f5d4;
            --turquesa-oscuro: #00bbf9;
            --blanco: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.95);
            --texto-principal: #1e293b;
            --texto-secundario: #64748b;
            --shadow-premium: 0 20px 40px rgba(6, 20, 46, 0.08);
            --shadow-hover: 0 30px 60px rgba(255, 0, 127, 0.15);
            --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        
        body { 
            background-color: #f1f5f9; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 245, 212, 0.05) 0px, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(255, 0, 127, 0.05) 0px, transparent 50%),
                radial-gradient(#cbd5e1 1px, transparent 1px); 
            background-size: 100% 100%, 100% 100%, 24px 24px;
            color: var(--texto-principal); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ANIMACIONES MAESTRAS */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseNeon {
            0% { box-shadow: 0 0 0 0 rgba(0, 245, 212, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 245, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 245, 212, 0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* HEADER ULTRA MODERNO */
        .header { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            transition: var(--transition-smooth);
        }
        .nav-container { max-width: 1300px; margin: 0 auto; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo-container { font-size: 24px; font-weight: 800; color: var(--azul-marino); text-decoration: none; display: flex; align-items: center; gap: 8px; letter-spacing: -0.5px; }
        .logo-container span { background: linear-gradient(135deg, var(--fucsia-neon), var(--turquet-oscuro)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .logo-container img { max-height: 45px; width: auto; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
        
        .nav-links { display: flex; align-items: center; gap: 8px; }
        .nav-links a { 
            color: var(--azul-marino); 
            text-decoration: none; 
            padding: 10px 20px;
            font-weight: 600; 
            font-size: 14px;
            border-radius: 12px;
            transition: var(--transition-smooth); 
        }
        .nav-links a:hover { background: rgba(6, 20, 46, 0.05); color: var(--fucsia-neon); }
        .nav-links a.active-link { background: var(--azul-marino); color: var(--turquesa); }

        /* HERO DINÁMICO & PERFIL CARD */
        .hero-section { 
            background: radial-gradient(circle at 90% 10%, rgba(0, 245, 212, 0.15), transparent 40%), linear-gradient(135deg, var(--azul-marino) 0%, var(--azul-profundo) 100%); 
            padding: 90px 24px; 
            display: flex; 
            justify-content: center; 
            position: relative;
            overflow: hidden;
        }
        .hero-section::before {
            content: ''; position: absolute; width: 300px; height: 300px; background: var(--fucsia); opacity: 0.1; filter: blur(100px); top: -50px; left: -50px;
        }
        
        .perfil-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border-radius: 32px; 
            padding: 48px; 
            display: flex; 
            align-items: center; 
            gap: 48px; 
            max-width: 1000px; 
            width: 100%; 
            box-shadow: 0 40px 100px rgba(6, 20, 46, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.7);
            position: relative;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .perfil-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 32px; border: 2px solid transparent; background: linear-gradient(135deg, rgba(255,0,127,0.3), rgba(0,245,212,0.3)) border-box; -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out; mask-composite: exclude; pointer-events: none;
        }
        
        .foto-wrapper { position: relative; flex-shrink: 0; }
        .foto-perfil { 
            width: 200px; 
            height: 250px;
            object-fit: cover;
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(6, 20, 46, 0.15);
            transform: rotate(-2deg);
            transition: var(--transition-smooth);
        }
        .perfil-card:hover .foto-perfil { transform: rotate(0deg) scale(1.03); }
        
        .badge-online { 
            position: absolute; bottom: -5px; right: -5px; width: 24px; height: 24px; background: var(--turquesa); border-radius: 50%; border: 4px solid var(--blanco); animation: pulseNeon 2s infinite;
        }
        
        .info-perfil { flex: 1; }
        .info-perfil h3 { color: var(--azul-marino); font-size: 36px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
        .info-perfil h4 { 
            background: linear-gradient(135deg, var(--fucsia-neon), var(--turquesa-oscuro)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; 
        }
        .info-perfil p { color: var(--texto-secundario); font-size: 16px; line-height: 1.7; margin-bottom: 28px; font-weight: 400; }
        
        .contacto-grid { display: flex; flex-wrap: wrap; gap: 16px; }
        .contacto-tag { 
            background: rgba(6, 20, 46, 0.04); padding: 12px 20px; border-radius: 14px; font-size: 14px; font-weight: 600; color: var(--azul-marino); display: flex; align-items: center; gap: 10px; text-decoration: none; border: 1px solid rgba(6, 20, 46, 0.02); transition: var(--transition-smooth);
        }
        .contacto-tag i { color: var(--fucsia-neon); font-size: 16px; }
        .contacto-tag:hover { background: var(--azul-marino); color: var(--turquesa); transform: translateY(-3px); }
        .contacto-tag:hover i { color: var(--turquesa); }

        /* SECCIÓN INVENTARIO */
        .propiedades-section { padding: 100px 24px; max-width: 1300px; margin: 0 auto; width: 100%; }
        .seccion-titulo { text-align: center; color: var(--azul-marino); font-size: 42px; font-weight: 800; margin-bottom: 60px; letter-spacing: -1px; position: relative; }
        .seccion-titulo span { background: linear-gradient(135deg, var(--fucsia-neon), var(--turquesa-oscuro)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .seccion-titulo::after { content: ''; width: 45px; height: 5px; background: var(--turquesa); border-radius: 10px; display: block; margin: 15px auto 0; }
        
        .grid-propiedades { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 40px; }
        
        /* TARJETAS DE PROPIEDADES INMERSIO */
        .tarjeta-propiedad { 
            background: var(--blanco); border-radius: 28px; overflow: hidden; box-shadow: var(--shadow-premium); transition: var(--transition-smooth); border: 1px solid rgba(226, 232, 240, 0.8); position: relative; display: flex; flex-direction: column; height: 100%; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .tarjeta-propiedad:hover { transform: translateY(-12px); box-shadow: var(--shadow-hover); border-color: rgba(255, 0, 127, 0.1); }
        
        .imagen-portada-wrapper { position: relative; height: 280px; overflow: hidden; }
        .imagen-portada-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .tarjeta-propiedad:hover .imagen-portada-wrapper img { transform: scale(1.08); filter: brightness(0.95); }
        
        .badge-operacion { 
            position: absolute; top: 24px; left: 24px; background: rgba(6, 20, 46, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: var(--turquesa); padding: 6px 18px; border-radius: 30px; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; border: 1px solid rgba(0, 245, 212, 0.3); z-index: 2;
        }
        .badge-venta { color: var(--fucsia-neon); border-color: rgba(255, 0, 127, 0.3); }
        
        .precio-tag { 
            position: absolute; bottom: 24px; right: 24px; background: var(--blanco); color: var(--azul-marino); padding: 10px 22px; border-radius: 20px; font-weight: 800; font-size: 22px; box-shadow: 0 10px 25px rgba(6, 20, 46, 0.15); letter-spacing: -0.5px; z-index: 2; border: 1px solid rgba(6, 20, 46, 0.05);
        }
        
        .info-propiedad { padding: 32px; display: flex; flex-direction: column; flex-grow: 1; }
        .info-propiedad h3 { color: var(--azul-marino); font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; transition: var(--transition-smooth); }
        .tarjeta-propiedad:hover .info-propiedad h3 { color: var(--fucsia-neon); }
        
        .estado-prop { font-size: 12px; font-weight: 700; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 30px; background: #f1f5f9; color: var(--texto-secundario); text-transform: uppercase; width: max-content; }
        .estado-disponible { background: rgba(0, 245, 212, 0.1); color: #00bbf9; }
        
        .detalles-basicos { display: flex; gap: 20px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .detalles-basicos span { color: var(--texto-principal); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .detalles-basicos i { color: var(--texto-secundario); font-size: 16px; }
        
        /* CARRUSEL MINIATURAS INTERACTIVO */
        .carrusel-container { margin-top: auto; }
        .carrusel-label { font-size: 11px; font-weight: 700; color: var(--texto-secundario); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .carrusel { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; scrollbar-width: none; }
        .carrusel::-webkit-scrollbar { display: none; }
        .carrusel img { width: 75px; height: 50px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: var(--transition-smooth); border: 2px solid transparent; opacity: 0.6; }
        .carrusel img:hover { opacity: 1; transform: scale(1.05); }
        .carrusel img.active-thumb { opacity: 1; border-color: var(--fucsia-neon); box-shadow: 0 4px 10px rgba(255, 0, 127, 0.2); }
        
        /* BOTÓN DE ACCIÓN PREMIUM */
        .btn-pago { 
            display: flex; justify-content: center; align-items: center; gap: 10px; background: var(--azul-marino); color: var(--blanco); padding: 16px; margin-top: 24px; border-radius: 16px; text-decoration: none; font-weight: 700; font-size: 15px; transition: var(--transition-smooth); border: 1px solid transparent; box-shadow: 0 4px 12px rgba(6, 20, 46, 0.1);
        }
        .btn-pago i { transition: var(--transition-smooth); }
        .btn-pago:hover { background: var(--fucsia-neon); box-shadow: 0 12px 24px rgba(255, 0, 127, 0.3); transform: translateY(-2px); }
        .btn-pago:hover i { transform: translateX(5px); }

        /* LOADING SKELETON */
        .skeleton-card { background: var(--blanco); border-radius: 28px; height: 480px; padding: 32px; display: flex; flex-direction: column; gap: 16px; }
        .skeleton-img { width: 100%; height: 200px; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 20px; }
        .skeleton-text { height: 24px; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; width: 70%; }

        /* FOOTER DE AGENCIA DE ELITE */
        .footer { 
            background: var(--azul-marino); color: var(--blanco); padding: 60px 24px 30px; margin-top: auto; position: relative; border-top: 1px solid rgba(255, 255, 255, 0.05); text-align: center; overflow: hidden;
        }
        .footer::before {
            content: ''; position: absolute; width: 200px; height: 200px; background: var(--turquesa); opacity: 0.03; filter: blur(80px); bottom: -50px; right: -50px;
        }
        .social-icons { display: flex; justify-content: center; gap: 16px; margin-bottom: 30px; z-index: 2; position: relative; }
        .social-icons a { 
            color: rgba(255, 255, 255, 0.6); font-size: 20px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); display: none; align-items: center; justify-content: center; border-radius: 50%; transition: var(--transition-smooth); text-decoration: none;
        }
        .social-icons a.active { display: inline-flex; }
        .social-icons a:hover { color: var(--turquesa); background: rgba(255, 255, 255, 0.08); transform: translateY(-5px) rotate(8deg); border-color: rgba(0, 245, 212, 0.3); }
        
        .footer-line { width: 100%; height: 1px; background: rgba(255, 255, 255, 0.08); margin: 24px 0; }
        #footer-text { color: rgba(255, 255, 255, 0.5); font-size: 14px; font-weight: 500; }
        .creador { color: rgba(255, 255, 255, 0.4); font-weight: 600; font-size: 12px; margin-top: 12px; letter-spacing: 0.5px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .creador span { color: var(--turquesa); font-weight: 700; letter-spacing: 0px; text-transform: none; }
        .creador i { color: var(--fucsia-neon); font-size: 11px; }

        @media (max-width: 850px) { 
            .perfil-card { flex-direction: column; text-align: center; padding: 32px; gap: 32px; } 
            .foto-perfil { width: 160px; height: 200px; transform: rotate(0); }
            .contacto-grid { justify-content: center; }
            .seccion-titulo { font-size: 32px; }
        }
        @media (max-width: 480px) {
            .grid-propiedades { grid-template-columns: 1fr; }
            .nav-container { padding: 14px 16px; }
            .logo-container { font-size: 20px; }
            .info-perfil h3 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <header class="header" id="navbar">
        <div class="nav-container">
            <a href="#" id="logo-header" class="logo-container">Busco tu Renta <span>by Jocelyn</span></a>
            <nav class="nav-links">
                <a href="#perfil">Sobre Mí</a>
                <a href="#propiedades" class="active-link">Propiedades</a>
            </nav>
        </div>
    </header>

    <section id="perfil" class="hero-section">
        <div id="perfil-contenedor" class="perfil-card">
            <div style="flex:1; text-align:center; color: var(--texto-secundario)"><i class="fa-solid fa-circle-notch fa-spin"></i> Sincronizando Perfil...</div>
        </div>
    </section>

    <section id="propiedades" class="propiedades-section">
        <h2 class="seccion-titulo">Explora Nuestro <span>Inventario</span></h2>
        <div id="propiedades-contenedor" class="grid-propiedades">
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text" style="width:50%"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text" style="width:50%"></div></div>
        </div>
    </section>

    <footer class="footer">
        <div class="social-icons">
            <a id="link-facebook" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
            <a id="link-instagram" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a id="link-youtube" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        </div>
        <div class="footer-line"></div>
        <p id="footer-text">&copy; 2026 Busco tu Renta by Jocelyn.</p>
        <p class="creador">Powered by <span>IntegratCore</span> <i class="fa-solid fa-bolt"></i></p>
    </footer>

    <script type="module">
        import { createClient } from 'https://esm.sh/@sanity/client';
        import imageUrlBuilder from 'https://esm.sh/@sanity/image-url';

        const client = createClient({
            projectId: 'h9qxyeqi', 
            dataset: 'production',
            useCdn: false,
            apiVersion: '2023-05-03'
        });

        const builder = (typeof imageUrlBuilder === 'function') ? imageUrlBuilder(client) : imageUrlBuilder.default(client);
        function urlFor(source) { return source ? builder.image(source) : null; }

        // Efecto visual dinámico al hacer scroll en el header
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                navbar.style.padding = '12px 24px';
                navbar.style.background = 'rgba(255, 255, 255, 0.95)';
                navbar.style.boxShadow = '0 10px 30px rgba(6, 20, 46, 0.05)';
            } else {
                navbar.style.padding = '18px 24px';
                navbar.style.background = 'rgba(255, 255, 255, 0.85)';
                navbar.style.boxShadow = '0 4px 30px rgba(0, 0, 0, 0.02)';
            }
        });

        // Cambiar dinámicamente la imagen de portada al hacer clic en las miniaturas del carrusel
        window.cambiarImagen = function(imgElement, nuevaUrl) {
            const wrapper = imgElement.closest('.tarjeta-propiedad');
            const mainImg = wrapper.querySelector('.main-prop-img');
            if(mainImg) {
                mainImg.style.opacity = '0.3';
                setTimeout(() => {
                    mainImg.src = nuevaUrl;
                    mainImg.style.opacity = '1';
                }, 150);
            }
            
            wrapper.querySelectorAll('.carrusel img').forEach(i => i.classList.remove('active-thumb'));
            imgElement.classList.add('active-thumb');
        }

        async function cargarDatos() {
            try {
                // 1. AJUSTES GENERALES
                const ajustes = await client.fetch('*[_type == "ajustes"][0]');
                if (ajustes) {
                    if (ajustes.logo && ajustes.logo.asset) {
                        document.getElementById('logo-header').innerHTML = `<img src="${urlFor(ajustes.logo).height(50).url()}" alt="Logo">`;
                    }
                    if (ajustes.redesSociales) {
                        if (ajustes.redesSociales.facebook) { document.getElementById('link-facebook').href = ajustes.redesSociales.facebook; document.getElementById('link-facebook').classList.add('active'); }
                        if (ajustes.redesSociales.instagram) { document.getElementById('link-instagram').href = ajustes.redesSociales.instagram; document.getElementById('link-instagram').classList.add('active'); }
                        if (ajustes.redesSociales.youtube) { document.getElementById('link-youtube').href = ajustes.redesSociales.youtube; document.getElementById('link-youtube').classList.add('active'); }
                    }
                    if (ajustes.textoFooter) document.getElementById('footer-text').innerText = ajustes.textoFooter;
                }

                // 2. PERFIL JOCELYN
                const perfil = await client.fetch('*[_type == "perfil"][0]');
                const pCont = document.getElementById('perfil-contenedor');
                if (perfil) {
                    const fotoUrl = (perfil.fotoPerfil && perfil.fotoPerfil.asset) ? urlFor(perfil.fotoPerfil).width(400).url() : '';
                    const telefono = perfil.contacto?.telefono ? `<a href="https://wa.me/${perfil.contacto.telefono.replace(/[^0-9]/g, '')}" target="_blank" class="contacto-tag"><i class="fa-brands fa-whatsapp"></i> ${perfil.contacto.telefono}</a>` : '';
                    const correo = perfil.contacto?.correo ? `<a href="mailto:${perfil.contacto.correo}" class="contacto-tag"><i class="fa-solid fa-envelope"></i> Enviar Correo</a>` : '';
                    
                    pCont.innerHTML = `
                        ${fotoUrl ? `<div class="foto-wrapper"><img src="${fotoUrl}" class="foto-perfil" alt="Jocelyn Capellan"><div class="badge-online"></div></div>` : ''}
                        <div class="info-perfil">
                            <h3>${perfil.nombre || 'Jocelyn Capellan'}</h3>
                            <h4>${perfil.tituloPro || 'Especialista en rentas y bienes raíces'}</h4>
                            <p>${perfil.descripcion || 'Profesional comprometida con ayudarte a encontrar la propiedad de tus sueños.'}</p>
                            <div class="contacto-grid">${telefono} ${correo}</div>
                        </div>
                    `;
                }

                // 3. PROPIEDADES INVENTARIO PREVENCION ERRORES
                const props = await client.fetch('*[_type == "propiedad"]');
                const propCont = document.getElementById('propiedades-contenedor');
                propCont.innerHTML = '';

                if (!props || props.length === 0) {
                    propCont.innerHTML = `<p style="text-align:center; grid-column:1/-1; color: var(--texto-secundario); padding: 40px;">No hay propiedades disponibles en este momento.</p>`;
                    return;
                }

                props.forEach((prop, index) => {
                    const imgPrinc = (prop.imagenPrincipal && prop.imagenPrincipal.asset) ? urlFor(prop.imagenPrincipal).width(800).url() : '';
                    
                    // Generación del carrusel con microinteracción de clic
                    let fotosHtml = '';
                    if (prop.galeria && Array.isArray(prop.galeria)) {
                        const fotosValidas = prop.galeria.filter(f => f && f.asset);
                        if(fotosValidas.length > 0) {
                            fotosHtml = `<div class="carrusel-container"><div class="carrusel-label">Galería Multimedia</div><div class="carrusel">`;
                            // La primera miniatura arranca activa si coincide con la portada
                            fotosValidas.forEach((f, fIdx) => {
                                const urlMiniatura = urlFor(f).width(300).url();
                                const urlCompleta = urlFor(f).width(800).url();
                                fotosHtml += `<img src="${urlMiniatura}" class="${fIdx === 0 ? 'active-thumb' : ''}" onclick="cambiarImagen(this, '${urlCompleta}')" alt="Vista">`;
                            });
                            fotosHtml += `</div></div>`;
                        }
                    }
                        
                    const esVenta = prop.operacion === 'Venta';
                    const badgeClase = esVenta ? 'badge-venta' : '';
                    const m2 = prop.caracteristicas?.metros ? `<span><i class="fa-solid fa-ruler-combined"></i> ${prop.caracteristicas.metros} m²</span>` : '';
                    const estadoTexto = prop.estado || 'Disponible';
                    const estadoClase = estadoTexto === 'Disponible' ? 'estado-disponible' : '';
                    
                    // Delay escalonado para la animación de entrada de las tarjetas
                    const animDelay = index * 0.15;

                    propCont.innerHTML += `
                        <div class="tarjeta-propiedad" style="animation-delay: ${animDelay}s">
                            <div class="imagen-portada-wrapper">
                                <div class="badge-operacion ${badgeClase}">${prop.operacion || 'Alquiler'}</div>
                                ${imgPrinc ? `<img src="${imgPrinc}" class="main-prop-img" alt="Propiedad">` : '<div style="background:#cbd5e1;height:100%;display:flex;align-items:center;justify-content:center;color:#64748b;">Sin Imagen Principal</div>'}
                                <div class="precio-tag">$${prop.precio ? prop.precio.toLocaleString() : '0'}</div>
                            </div>
                            <div class="info-propiedad">
                                <h3>${prop.titulo || 'Propiedad Exclusiva'}</h3>
                                <div class="estado-prop ${estadoClase}"><i class="fa-solid fa-circle" style="font-size:8px"></i> ${estadoTexto}</div>
                                
                                <div class="detalles-basicos">
                                    <span><i class="fa-solid fa-bed"></i> ${prop.caracteristicas?.habitaciones || 0} Hab</span>
                                    <span><i class="fa-solid fa-bath"></i> ${prop.caracteristicas?.banos || 0} Baños</span>
                                    ${m2}
                                </div>
                                
                                ${fotosHtml}
                                ${prop.linkDePago ? `
                                    <a href="${prop.linkDePago}" target="_blank" class="btn-pago">
                                        Solicitar Información <i class="fa-solid fa-arrow-right"></i>
                                    </a>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('propiedades-contenedor').innerHTML = `
                    <div style="color:#ef4444; grid-column:1/-1; text-align:center; padding: 40px; background: #fee2e2; border-radius: 16px; border: 1px solid #fca5a5;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:24px; margin-bottom:10px"></i>
                        <p>Error en la sincronización de datos de IntegratCore: ${err.message}</p>
                    </div>`;
            }
        }
        cargarDatos();
    </script>
</body>
</html>

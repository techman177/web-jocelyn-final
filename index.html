<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busco tu Renta by Jocelyn | Alquileres de Propiedades Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-general: #f8fafc;
            --azul-marino: #06142e;
            --fucsia-neon: #ff007f;
            --turquesa: #00f5d4;
            --blanco: #ffffff;
            --texto-principal: #0f172a;
            --texto-secundario: #475569;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow-premium: 0 20px 40px rgba(6, 20, 46, 0.04);
            --shadow-hover: 0 30px 60px rgba(255, 0, 127, 0.1);
            --transicion: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        
        body {
            background-color: var(--bg-general);
            color: var(--texto-principal);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ANIMACIONES */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* HEADER GLASSMORPHISM */
        .header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            padding: 24px 0; transition: var(--transicion);
        }
        .header.scrolled {
            padding: 14px 0; box-shadow: var(--shadow-premium); background: rgba(255, 255, 255, 0.95);
        }
        .nav-container { max-width: 1280px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo-container { font-size: 24px; font-weight: 800; color: var(--azul-marino); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .logo-container span { color: var(--fucsia-neon); }
        .logo-container img { max-height: 45px; width: auto; }
        .nav-links a { color: var(--azul-marino); text-decoration: none; font-weight: 600; margin-left: 32px; font-size: 15px; transition: var(--transicion); }
        .nav-links a:hover { color: var(--fucsia-neon); }

        /* HERO PROFILE CARD */
        .hero-section {
            padding: 80px 24px; display: flex; justify-content: center;
            background: radial-gradient(circle at top right, rgba(0, 245, 212, 0.08), transparent 45%),
                        radial-gradient(circle at bottom left, rgba(255, 0, 127, 0.04), transparent 45%);
        }
        .perfil-card {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 48px;
            display: flex; align-items: center; gap: 48px; max-width: 1000px; width: 100%;
            box-shadow: var(--shadow-premium); animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .foto-perfil { width: 200px; height: 200px; object-fit: cover; border-radius: 24px; border: 4px solid var(--blanco); box-shadow: 0 10px 25px rgba(6,20,46,0.08); }
        .info-perfil h3 { color: var(--azul-marino); font-size: 38px; font-weight: 800; margin-bottom: 6px; letter-spacing: -1px; }
        .info-perfil h4 { color: var(--fucsia-neon); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 18px; }
        .info-perfil p { color: var(--texto-secundario); font-size: 16px; line-height: 1.7; margin-bottom: 28px; }
        
        .btn-contacto-group { display: flex; gap: 16px; flex-wrap: wrap; }
        .btn-contacto { padding: 14px 28px; border-radius: 14px; text-decoration: none; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 10px; transition: var(--transicion); }
        .btn-whatsapp { background-color: var(--azul-marino); color: var(--blanco); }
        .btn-whatsapp:hover { background-color: var(--fucsia-neon); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,0,127,0.2); }

        /* INVENTARIO DE RENTAS */
        .inventario-section { padding: 40px 24px 100px; max-width: 1280px; margin: 0 auto; width: 100%; }
        .seccion-titulo { text-align: center; color: var(--azul-marino); font-size: 42px; font-weight: 800; margin-bottom: 60px; letter-spacing: -1px; }
        .seccion-titulo span { color: var(--fucsia-neon); }
        .grid-propiedades { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 40px; }

        /* SKELETON LOADING */
        .skeleton-card { background: var(--blanco); border-radius: 24px; height: 500px; padding: 24px; display: flex; flex-direction: column; gap: 16px; box-shadow: var(--shadow-premium); }
        .skeleton-box { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        .skeleton-img { height: 250px; }
        .skeleton-title { height: 26px; width: 75%; }
        .skeleton-text { height: 16px; width: 100%; }

        /* TARJETAS PREMIUM */
        .tarjeta-propiedad {
            background: var(--blanco); border-radius: 26px; box-shadow: var(--shadow-premium);
            transition: var(--transicion); display: flex; flex-direction: column; opacity: 0;
            border: 1px solid rgba(226, 232, 240, 0.7); overflow: hidden;
        }
        .tarjeta-propiedad:hover { transform: translateY(-10px); box-shadow: var(--shadow-hover); }
        
        .imagen-wrapper { position: relative; height: 270px; overflow: hidden; background-color: #e2e8f0; }
        .imagen-principal { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease; }
        .tarjeta-propiedad:hover .imagen-principal { transform: scale(1.06); }
        
        .badge-renta { position: absolute; top: 20px; left: 20px; background: var(--azul-marino); color: var(--turquesa); padding: 6px 18px; border-radius: 30px; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; z-index: 2; border: 1px solid rgba(0,245,212,0.3); }
        .precio-tag { position: absolute; bottom: 20px; right: 24px; background: var(--blanco); color: var(--azul-marino); padding: 10px 22px; border-radius: 18px; font-weight: 800; font-size: 22px; box-shadow: 0 10px 25px rgba(6,20,46,0.1); z-index: 2; }
        .precio-tag span { font-size: 14px; color: var(--texto-secundario); font-weight: 500; }

        .info-propiedad { padding: 28px 28px 28px; display: flex; flex-direction: column; flex-grow: 1; }
        .info-propiedad h3 { color: var(--azul-marino); font-size: 22px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
        
        .tipo-badge { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--fucsia-neon); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
        
        .detalles-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; margin-bottom: 20px; }
        .detalle-item { display: flex; flex-direction: column; align-items: center; text-align: center; background: #f8fafc; padding: 8px; border-radius: 12px; }
        .detalle-item span:first-child { color: var(--texto-secundario); font-size: 11px; font-weight: 600; margin-bottom: 2px; }
        .detalle-item span:last-child { color: var(--azul-marino); font-size: 13px; font-weight: 800; }

        /* GALERÍA / CARRUSEL */
        .carrusel-galeria { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: auto; scrollbar-width: none; }
        .carrusel-galeria::-webkit-scrollbar { display: none; }
        .thumb-img { width: 65px; height: 45px; object-fit: cover; border-radius: 8px; cursor: pointer; opacity: 0.5; transition: var(--transicion); border: 2px solid transparent; flex-shrink: 0; }
        .thumb-img:hover, .thumb-img.active { opacity: 1; border-color: var(--fucsia-neon); }

        .btn-accion { display: flex; justify-content: center; align-items: center; gap: 10px; background: var(--azul-marino); color: var(--blanco); padding: 15px; border-radius: 14px; text-decoration: none; font-weight: 700; font-size: 14px; transition: var(--transicion); margin-top: 24px; box-shadow: 0 4px 12px rgba(6,20,46,0.1); }
        .btn-accion:hover { background: var(--fucsia-neon); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,0,127,0.2); }

        /* FOOTER */
        .footer { background-color: var(--azul-marino); padding: 50px 24px 30px; text-align: center; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05); }
        .redes-sociales { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
        .redes-sociales a { color: var(--blanco); background: rgba(255, 255, 255, 0.04); width: 42px; height: 42px; display: none; align-items: center; justify-content: center; border-radius: 50%; font-size: 16px; text-decoration: none; transition: var(--transicion); }
        .redes-sociales a.visible { display: flex; }
        .redes-sociales a:hover { background: var(--turquesa); color: var(--azul-marino); transform: translateY(-4px); }
        .footer-texto { color: rgba(255, 255, 255, 0.5); font-size: 14px; margin-bottom: 12px; }
        .firma-agencia { color: rgba(255, 255, 255, 0.3); font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .firma-agencia span { color: var(--blanco); }
        .firma-agencia i { color: var(--fucsia-neon); font-size: 13px; }

        @media (max-width: 850px) { .perfil-card { flex-direction: column; text-align: center; padding: 32px 24px; gap: 24px; } }
        @media (max-width: 600px) { .grid-propiedades { grid-template-columns: 1fr; } .nav-links { display: none; } .seccion-titulo { font-size: 32px; } }
    </style>
</head>
<body>

    <header class="header" id="main-header">
        <div class="nav-container">
            <a href="#" class="logo-container" id="logo-render">Busco tu Renta <span>by Jocelyn</span></a>
            <nav class="nav-links">
                <a href="#perfil">Sobre Mí</a>
                <a href="#inventario">Alquileres</a>
            </nav>
        </div>
    </header>

    <section id="perfil" class="hero-section">
        <div class="perfil-card" id="perfil-render">
            <div style="width:100%; text-align:center; color: var(--texto-secundario);">
                <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color:var(--fucsia-neon)"></i>
                <p style="margin-top:12px; font-weight:600;">Sincronizando Catálogo de Alquileres...</p>
            </div>
        </div>
    </section>

    <section id="inventario" class="inventario-section">
        <h2 class="seccion-titulo">Exclusividad en <span>Alquileres</span></h2>
        <div class="grid-propiedades" id="inventario-render">
            <div class="skeleton-card"><div class="skeleton-box skeleton-img"></div><div class="skeleton-box skeleton-title"></div><div class="skeleton-box skeleton-text"></div></div>
            <div class="skeleton-card"><div class="skeleton-box skeleton-img"></div><div class="skeleton-box skeleton-title"></div><div class="skeleton-box skeleton-text"></div></div>
        </div>
    </section>

    <footer class="footer">
        <div class="redes-sociales">
            <a href="#" id="rs-facebook" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" id="rs-instagram" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" id="rs-youtube" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        </div>
        <div class="footer-texto" id="footer-text-render">© 2026 Busco tu Renta by Jocelyn.</div>
        <div class="firma-agencia">
            Desarrollado y automatizado por <span>IntegratCore</span> <i class="fa-solid fa-bolt"></i>
        </div>
    </footer>

    <script type="module">
        import { createClient } from 'https://esm.sh/@sanity/client';
        import imageUrlBuilder from 'https://esm.sh/@sanity/image-url';

        const client = createClient({
            projectId: 'h9qxyeqi', 
            dataset: 'production',
            useCdn: false,
            apiVersion: '2023-05-03'
        });

        const builder = (typeof imageUrlBuilder === 'function') ? imageUrlBuilder(client) : imageUrlBuilder.default(client);
        function urlFor(source) { return builder.image(source); }

        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 40) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });

        window.cambiarImagen = function(imgElement, nuevaUrl) {
            const tarjeta = imgElement.closest('.tarjeta-propiedad');
            const mainImg = tarjeta.querySelector('.imagen-principal');
            mainImg.style.opacity = '0.4';
            setTimeout(() => {
                mainImg.src = nuevaUrl;
                mainImg.style.opacity = '1';
            }, 180);
            tarjeta.querySelectorAll('.thumb-img').forEach(min => min.classList.remove('active'));
            imgElement.classList.add('active');
        };

        async function cargarDatos() {
            try {
                const [ajustes, perfil, propiedades] = await Promise.all([
                    client.fetch('*[_type == "ajustes"][0]'),
                    client.fetch('*[_type == "perfil"][0]'),
                    client.fetch('*[_type == "propiedad"]')
                ]);

                if (ajustes) {
                    if (ajustes.logo && ajustes.logo.asset) {
                        document.getElementById('logo-header').innerHTML = `<img src="${urlFor(ajustes.logo).height(60).url()}" alt="Logo">`;
                    }
                    if (ajustes.redesSociales) {
                        const fb = document.getElementById('rs-facebook');
                        const ig = document.getElementById('rs-instagram');
                        const yt = document.getElementById('rs-youtube');
                        if (ajustes.redesSociales.facebook) { fb.href = ajustes.redesSociales.facebook; fb.classList.add('visible'); }
                        if (ajustes.redesSociales.instagram) { ig.href = ajustes.redesSociales.instagram; ig.classList.add('visible'); }
                        if (ajustes.redesSociales.youtube) { yt.href = ajustes.redesSociales.youtube; yt.classList.add('visible'); }
                    }
                    if (ajustes.textoFooter) document.getElementById('footer-text-render').innerText = ajustes.textoFooter;
                }

                const perfilContenedor = document.getElementById('perfil-render');
                if (perfil) {
                    const fotoHtml = (perfil.fotoPerfil && perfil.fotoPerfil.asset) ? `<img src="${urlFor(perfil.fotoPerfil).width(350).url()}" alt="Jocelyn" class="foto-perfil">` : '';
                    const btnWs = perfil.contacto?.telefono ? `<a href="https://wa.me/${perfil.contacto.telefono.replace(/\D/g,'')}" target="_blank" class="btn-contacto btn-whatsapp"><i class="fa-brands fa-whatsapp"></i> Consultar por WhatsApp</a>` : '';
                    
                    perfilContenedor.innerHTML = `
                        ${fotoHtml}
                        <div class="info-perfil">
                            <h3>${perfil.nombre || 'Jocelyn Capellan'}</h3>
                            <h4>${perfil.tituloPro || 'Especialista en Alquileres de Bienes Raíces'}</h4>
                            <p>${perfil.descripcion || 'Te ayudo a encontrar el hogar en alquiler perfecto bajo una gestión premium y profesional.'}</p>
                            <div class="btn-contacto-group">${btnWs}</div>
                        </div>
                    `;
                }

                const invContenedor = document.getElementById('inventario-render');
                invContenedor.innerHTML = ''; 

                if (!propiedades || propiedades.length === 0) {
                    invContenedor.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding: 40px; font-weight:600; color:var(--texto-secundario);">No hay propiedades en alquiler disponibles en este momento.</p>`;
                    return;
                }

                propiedades.forEach((prop, index) => {
                    const portUrlFull = (prop.imagenPrincipal && prop.imagenPrincipal.asset) ? urlFor(prop.imagenPrincipal).width(900).url() : '';
                    const imgPortada = portUrlFull ? `<img src="${portUrlFull}" class="imagen-principal" alt="Propiedad">` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#94a3b8;font-weight:600;">Sin Foto</div>`;

                    let htmlGaleria = '';
                    if (prop.galeria && Array.isArray(prop.galeria)) {
                        const fotosValidas = prop.galeria.filter(f => f && f.asset);
                        if (fotosValidas.length > 0) {
                            htmlGaleria = `<div class="carrusel-galeria">`;
                            if (portUrlFull) {
                                htmlGaleria += `<img src="${urlFor(prop.imagenPrincipal).width(120).url()}" class="thumb-img active" onclick="window.cambiarImagen(this, '${portUrlFull}')" alt="Portada">`;
                            }
                            fotosValidas.forEach((foto) => {
                                const urlThumb = urlFor(foto).width(120).url();
                                const urlFull = urlFor(foto).width(900).url();
                                htmlGaleria += `<img src="${urlThumb}" class="thumb-img" onclick="window.cambiarImagen(this, '${urlFull}')" alt="Vista">`;
                            });
                            htmlGaleria += `</div>`;
                        }
                    }

                    const precioFmt = prop.precioMensual ? prop.precioMensual.toLocaleString('en-US') : '0';
                    const enlaceWs = prop.linkWhatsApp ? prop.linkWhatsApp : '#';
                    const animDelay = (index * 0.12).toFixed(2);

                    invContenedor.innerHTML += `
                        <div class="tarjeta-propiedad" style="animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: ${animDelay}s;">
                            <div class="imagen-wrapper">
                                <div class="badge-renta">Alquiler</div>
                                ${imgPortada}
                                <div class="precio-tag">$${precioFmt}<span>/mes</span></div>
                            </div>
                            
                            <div class="info-propiedad">
                                <span class="tipo-badge"><i class="fa-solid fa-building"></i> ${prop.tipoPropiedad || 'Inmueble'}</span>
                                <h3>${prop.titulo || 'Apartamento Exclusivo'}</h3>
                                
                                <div class="detalles-grid">
                                    <div class="detalle-item"><span>Hab</span><span>${prop.caracteristicas?.habitaciones || 0}</span></div>
                                    <div class="detalle-item"><span>Baños</span><span>${prop.caracteristicas?.banos || 0}</span></div>
                                    <div class="detalle-item"><span>Parqueos</span><span>${prop.caracteristicas?.parqueos || 0}</span></div>
                                    <div class="detalle-item"><span>Área</span><span>${prop.caracteristicas?.metros || 0}m²</span></div>
                                </div>
                                
                                ${htmlGaleria}
                                
                                <a href="${enlaceWs}" target="_blank" class="btn-accion">
                                    Solicitar Alquiler <i class="fa-solid fa-arrow-right"></i>
                                </a>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                document.getElementById('inventario-render').innerHTML = `
                    <div style="grid-column:1/-1; background:#fee2e2; border:1px solid #f87171; color:#b91c1c; padding: 24px; border-radius:16px; text-align:center;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:24px; margin-bottom:10px;"></i>
                        <p style="font-weight:700;">Error de sincronización con la base de datos de IntegratCore.</p>
                    </div>`;
            }
        }

        cargarDatos();
    </script>
</body>
</html>
